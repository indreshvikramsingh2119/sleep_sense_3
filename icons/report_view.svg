<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#blueGrad)" opacity="0.1"/>
  
  <!-- Document/report icon -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="white" stroke="url(#blueGrad)" stroke-width="2"/>
  
  <!-- Report lines -->
  <line x1="10" y1="9" x2="22" y2="9" stroke="url(#blueGrad)" stroke-width="1.5"/>
  <line x1="10" y1="12" x2="20" y2="12" stroke="url(#blueGrad)" stroke-width="1.5"/>
  <line x1="10" y1="15" x2="21" y2="15" stroke="url(#blueGrad)" stroke-width="1.5"/>
  <line x1="10" y1="18" x2="19" y2="18" stroke="url(#blueGrad)" stroke-width="1.5"/>
  <line x1="10" y1="21" x2="20" y2="21" stroke="url(#blueGrad)" stroke-width="1.5"/>
  
  <!-- Chart/graph indicator on report -->
  <rect x="14" y="10" width="6" height="4" fill="url(#blueGrad)" opacity="0.3"/>
  <polyline points="15,13 16,11 17,12 18,10 19,12" fill="none" stroke="url(#blueGrad)" stroke-width="1"/>
</svg>
