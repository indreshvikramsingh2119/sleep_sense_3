<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="redGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#EF4444;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DC2626;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="16" cy="16" r="14" fill="url(#redGrad)" opacity="0.1"/>
  
  <!-- Medical report icon -->
  <rect x="7" y="5" width="18" height="22" rx="2" fill="white" stroke="url(#redGrad)" stroke-width="2"/>
  
  <!-- Medical cross symbol -->
  <rect x="15" y="9" width="2" height="6" fill="url(#redGrad)"/>
  <rect x="13" y="11" width="6" height="2" fill="url(#redGrad)"/>
  
  <!-- Report lines -->
  <line x1="10" y1="18" x2="22" y2="18" stroke="url(#redGrad)" stroke-width="1"/>
  <line x1="10" y1="20" x2="20" y2="20" stroke="url(#redGrad)" stroke-width="1"/>
  <line x1="10" y1="22" x2="21" y2="22" stroke="url(#redGrad)" stroke-width="1"/>
</svg>
